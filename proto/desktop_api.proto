syntax = "proto3";

package lofonic.desktop.v1;

service DesktopGateway {
  rpc ImportPlaylist(ImportPlaylistRequest) returns (ImportPlaylistResponse);
  rpc ListLibraryTracks(ListLibraryTracksRequest) returns (ListLibraryTracksResponse);
  rpc ListDownloadJobs(ListDownloadJobsRequest) returns (ListDownloadJobsResponse);
  rpc GetPipelineStatus(GetPipelineStatusRequest) returns (GetPipelineStatusResponse);
}

message ImportPlaylistRequest {
  string url = 1;
}

message ImportPlaylistResponse {
  string job_id = 1;
}

message ListLibraryTracksRequest {}

message TrackSummary {
  string id = 1;
  string title = 2;
  string artist = 3;
  uint32 duration_sec = 4;
  string format = 5;
  uint32 sample_rate_hz = 6;
  uint32 bitrate_kbps = 7;
  float lufs = 8;
}

message ListLibraryTracksResponse {
  repeated TrackSummary tracks = 1;
}

message ListDownloadJobsRequest {}

message DownloadJobStatus {
  string id = 1;
  float progress_percent = 2;
  string state = 3;
}

message ListDownloadJobsResponse {
  repeated DownloadJobStatus jobs = 1;
}

message GetPipelineStatusRequest {
  string job_id = 1;
}

message PipelineStep {
  string step = 1;
  string status = 2;
}

message GetPipelineStatusResponse {
  repeated PipelineStep steps = 1;
}
